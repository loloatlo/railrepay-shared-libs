# =============================================================================
# RailRepay shared-libs — update-lockfile (added at BL-367 / APPCORE-001a)
# =============================================================================
# Manual (workflow_dispatch) workflow that generates the root package-lock.json
# on the ubuntu-latest CI runner and commits it back to main. CH-141: lockfiles
# must be generated on the runner, never on the (Windows, npm-blocked) dev
# machine.
#
# ROOT CAUSE (found via a temporary diagnostic step, since removed —
# BL-367 APPCORE-001a): package-lock.json was listed in .gitignore and had
# NEVER been committed at all. It wasn't "stale relative to app-core" as
# originally assumed — it simply didn't exist in the repo. Every checkout
# started with no lockfile; `npm install` on the runner always regenerated
# one correctly (confirmed via `npm ls --workspaces` resolving
# @railrepay/app-core -> zod/zustand correctly, and `npm ci` succeeding after
# a clean node_modules wipe within the same job) — but `git diff --quiet` on
# an untracked path always reports "no differences" regardless of content
# (git diff only compares tracked files), so the old commit-detection logic
# silently no-op'd forever. Fixed by: (1) removing package-lock.json from
# .gitignore, (2) staging before diffing here so a first-time add is detected
# as a real change instead of being invisible to `git diff` on an untracked
# path.
#
# BL-391 Slice 1 (TD-2, 2026-07-20) — SOP-012 gate rework. Two gaps found by
# the BL-379 AC-4 canary (recorded on BL-391):
#   1. gitleaks' DEFAULT ruleset path-allowlists lock files, so a credential
#      planted in package-lock.json is never flagged by a plain
#      gitleaks-action scan of the repo (live false-negative: run
#      29725952797). The identical key under a non-lockfile name scans RED
#      (run 29726177651). Fix: copy package-lock.json to a NON-allowlisted
#      temp name under $RUNNER_TEMP and scan THAT copy with `gitleaks detect
#      --no-git` (a pinned, sha256-verified binary — same asset/version as
#      BL-377 — not the gitleaks-action wrapper, which re-applies the default
#      ruleset/allowlist).
#   2. The old single "Commit lockfile" step pushed BEFORE the SOP-012 L1
#      scan ran, so a leak would be scanned only AFTER it already reached
#      origin. Fixed by re-sequencing: regenerate -> commit LOCAL only (no
#      push) -> commit-scan (existing gitleaks-action, default config, repo-
#      wide) -> lockfile-scan (new, targeted) -> push, LAST, only if a local
#      commit was actually made. Actions' normal fail-fast behaviour means a
#      failure in either scan step skips the push step automatically; no
#      extra `if:` needed for that gating.
#
# Run manually via: gh workflow run update-lockfile.yml
# =============================================================================

name: update-lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate root package-lock.json
        run: npm install

      # BL-391: commit LOCAL only here — no push. `changed` output lets the
      # final push step (and only that step) skip cleanly on a no-op.
      - name: Commit lockfile locally (if changed or newly added)
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet -- package-lock.json; then
            echo "package-lock.json already in sync — nothing to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: commit root package-lock.json for app-core (update-lockfile dispatch, CH-141, BL-367 APPCORE-001a)" -m "Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # SOP-012 L1 (BL-379) — repo-wide default-ruleset scan, now BEFORE push
      # (BL-391 fixes the post-push ordering bug). Runs every time (cheap,
      # idempotent) — a no-op commit still gets scanned, which is harmless.
      - name: Commit-scan (SOP-012 L1, gitleaks-action default config)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # BL-391: targeted lockfile scan. gitleaks' default ruleset
      # path-allowlists files literally named package-lock.json, so the
      # commit-scan step above CANNOT catch a leak planted there (BL-379 AC-4
      # canary, run 29725952797). Copying it to a non-lockfile name under
      # $RUNNER_TEMP and scanning that copy with `--no-git` (file contents
      # only, not git history) sidesteps the allowlist. Uses a pinned,
      # sha256-verified gitleaks binary (same v8.24.3 linux_x64 asset as
      # BL-377) rather than the gitleaks-action wrapper, which would re-apply
      # the same default allowlist we're trying to dodge.
      - name: Lockfile-scan (BL-391 — dodges gitleaks' default lockfile allowlist)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o "$ASSET" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ASSET}"
          echo "${GITLEAKS_SHA256}  ${ASSET}" | sha256sum -c -
          tar -xzf "$ASSET" gitleaks
          # Non-lockfile basename is the fix — do NOT rename this back to
          # package-lock.json, that would silently reinstate the allowlist gap.
          cp package-lock.json "$RUNNER_TEMP/lockfile-scan-target.json"
          ./gitleaks detect --no-git --source "$RUNNER_TEMP/lockfile-scan-target.json" --redact -v

      # BL-391: push is now LAST, and only runs if a local commit was made.
      # It is only reached at all if both scan steps above exited 0 (Actions'
      # default fail-fast behaviour skips remaining steps on a step failure).
      - name: Push (only if a local commit was made and both scans passed)
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:main
