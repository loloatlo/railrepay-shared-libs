# =============================================================================
# RailRepay — secret-scan workflow template (SOPs Rule 25, added v3.1 2026-07-09)
# BL-377 (TD-2, 2026-07-19): root-commit / unresolvable-range false-red fix.
# =============================================================================
# Copy to .github/workflows/secret-scan.yml in each railrepay repo, alongside
# the shared .gitleaks.toml at the repo root.
#
# A detected credential FAILS the job and blocks the PR. This is the enforcing
# gate for Rule 25 §2. If it fires on a REAL credential: rotate first (Rule 25
# §4), then clean history if needed — never allowlist it.
#
# No secret literal lives in this workflow. GITHUB_TOKEN is the automatic
# per-run token; GITLEAKS_LICENSE is only needed for organization-owned repos —
# loloatlo repos are personal, so none is set.
#
# BL-377: gitleaks-action@v2 scans the push's commit range (`before..after`).
# When `before` is the git null SHA (root/first push) — or otherwise
# unresolvable in this checkout (e.g. a force-push whose old base is gone) —
# that range can't be resolved, and the action was observed to silently fall
# back to a partial/empty scan ("no leaks found") instead of failing loudly:
# a false-red pass, not a true negative. Fix: detect that condition first,
# and when it holds, run a real FULL-HISTORY scan via a pinned, checksum-
# verified gitleaks binary instead of the ranged action. PR and
# workflow_dispatch runs are unaffected (github.event.before doesn't apply to
# them) and keep using gitleaks-action@v2 exactly as before.

name: secret-scan

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans all commits in the push/PR range

      # AC-1: detect a root-commit / unresolvable push range. `before` is the
      # 40-zero null SHA on a repo's very first push; otherwise it's
      # unresolvable if this checkout can't find it as a commit at all (e.g.
      # a force-push whose prior base was rewritten away). Either case means
      # gitleaks-action's `before..after` range scan can't be trusted.
      - name: Detect root-commit / unresolvable push range
        id: base
        if: github.event_name == 'push'
        run: |
          set -uo pipefail
          BEFORE="${{ github.event.before }}"
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ "$BEFORE" = "$NULL_SHA" ]; then
            echo "full_history=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse -q --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            echo "full_history=false" >> "$GITHUB_OUTPUT"
          else
            echo "full_history=true" >> "$GITHUB_OUTPUT"
          fi

      # AC-2: full-history fallback. Downloads a PINNED gitleaks release
      # binary over HTTPS from GitHub's releases/download/ path and verifies
      # it against a known sha256 checksum before executing it — no
      # unpinned `curl | bash`. Version/checksum independently verified
      # against gitleaks_8.24.3_checksums.txt at github.com/gitleaks/gitleaks
      # (matches the version gitleaks-action@v2 currently bundles).
      - name: Full-history scan (root-commit / unresolvable-range fallback)
        if: steps.base.outputs.full_history == 'true'
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o "$ASSET" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ASSET}"
          echo "${GITLEAKS_SHA256}  ${ASSET}" | sha256sum -c -
          tar -xzf "$ASSET" gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact -v

      # AC-3: unchanged ranged action, now inverse-guarded so it only runs
      # when the push range IS resolvable (or the event isn't a push at all —
      # pull_request / workflow_dispatch behaviour is byte-identical to before).
      - name: Ranged scan (gitleaks-action)
        if: github.event_name != 'push' || steps.base.outputs.full_history != 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # BL-391 Slice 2 (AC-a): targeted lockfile scan. gitleaks' DEFAULT
      # ruleset path-allowlists files literally named package-lock.json (BL-379
      # AC-4 canary; false-negative run 29725952797), so NEITHER the ranged
      # gitleaks-action step above NOR the full-history fallback can ever catch
      # a leak planted in a lockfile — both apply the same default allowlist.
      # Runs on EVERY trigger (push, pull_request, workflow_dispatch) — no
      # `if:` gating on full_history, since the allowlist gap is independent of
      # which range-scan path executed above. Enumerates every git-TRACKED
      # lockfile (a repo may have more than one), copies each to a non-lockfile
      # basename under $RUNNER_TEMP, and scans that copy with the same pinned +
      # sha256-verified gitleaks binary used in the AC-2 fallback via
      # `--no-git` (file contents only, not git history) — the rename sidesteps
      # the path-based allowlist while the default ruleset still applies.
      - name: Lockfile-scan (dodges gitleaks' default lockfile allowlist)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o "$ASSET" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ASSET}"
          echo "${GITLEAKS_SHA256}  ${ASSET}" | sha256sum -c -
          tar -xzf "$ASSET" gitleaks

          i=0
          while IFS= read -r lf; do
            i=$((i + 1))
            # Non-lockfile basename is the fix — do NOT rename this to
            # package-lock.json, that would silently reinstate the allowlist gap.
            TARGET="$RUNNER_TEMP/lockfile-scan-${i}.json"
            cp "$lf" "$TARGET"
            echo "Scanning tracked lockfile: $lf"
            ./gitleaks detect --no-git --source "$TARGET" --redact -v
          done < <(git ls-files '*package-lock.json')
